# Server Configuration
server.port=8085
server.servlet.context-path=/api

# Logging Configuration
logging.level.com.example.springlearn=DEBUG
logging.level.org.springframework=INFO
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/spring-learn.log
logging.file.max-size=10MB
logging.file.max-history=30

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidationWithSufficientLength1234567890
jwt.expiration=86400000
jwt.header=Authorization
jwt.prefix=Bearer

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:spring_learn_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring Security
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# Actuator
management.endpoints.web.exposure.include=health,info,metrics

# Date Format
app.date-format=yyyy-MM-dd
app.datetime-format=yyyy-MM-dd HH:mm:ss

# Bean Scopes
app.country.scope=singleton
app.employee.scope=prototype

# Bean Overriding
spring.main.allow-bean-definition-overriding=true